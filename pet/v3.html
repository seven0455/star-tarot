<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小七 - 实时对话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }
        
        /* 头部 */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
            position: relative;
        }
        
        .avatar-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
            position: relative;
        }
        
        .avatar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffd1dc 0%, #ffb6c1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 20px rgba(255,182,193,0.5);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        /* 女孩脸部 */
        .face {
            width: 60px;
            height: 50px;
            position: relative;
        }
        
        /* 眼睛 */
        .eyes {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .eye {
            width: 14px;
            height: 16px;
            background: #2d2d2d;
            border-radius: 50%;
            position: relative;
            animation: blink 4s ease-in-out infinite;
        }
        
        .eye::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 3px;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
        }
        
        @keyframes blink {
            0%, 95%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
        
        /* 腮红 */
        .blush {
            position: absolute;
            width: 10px;
            height: 6px;
            background: rgba(255,150,150,0.6);
            border-radius: 50%;
            top: 20px;
        }
        
        .blush.left { left: 2px; }
        .blush.right { right: 2px; }
        
        /* 嘴巴 */
        .mouth {
            width: 8px;
            height: 4px;
            background: #ff6b8a;
            border-radius: 0 0 10px 10px;
            margin: 0 auto;
        }
        
        /* 头发 */
        .hair {
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 25px;
            background: #2d2d2d;
            border-radius: 50% 50% 0 0;
        }
        
        .hair::before,
        .hair::after {
            content: '';
            position: absolute;
            background: #2d2d2d;
        }
        
        .hair::before {
            width: 15px;
            height: 30px;
            left: -5px;
            top: 10px;
            border-radius: 0 0 0 50%;
        }
        
        .hair::after {
            width: 15px;
            height: 30px;
            right: -5px;
            top: 10px;
            border-radius: 0 0 50% 0;
        }
        
        /* 双马尾 */
        .twins-tails {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 40px;
        }
        
        .twins-tails::before,
        .twins-tails::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 40px;
            background: #2d2d2d;
            border-radius: 0 0 50% 50%;
            top: 5px;
            animation: swing 2s ease-in-out infinite;
        }
        
        .twins-tails::before {
            left: 5px;
            transform-origin: top center;
        }
        
        .twins-tails::after {
            right: 5px;
            transform-origin: top center;
            animation-delay: 0.1s;
        }
        
        @keyframes swing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        
        /* 耳机 */
        .headphones {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 30px;
            border: 4px solid #ff6b35;
            border-radius: 50%;
            border-bottom: none;
        }
        
        .headphones::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 5px;
            width: 12px;
            height: 15px;
            background: #ff6b35;
            border-radius: 3px;
        }
        
        .headphones::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 5px;
            width: 12px;
            height: 15px;
            background: #ff6b35;
            border-radius: 3px;
        }
        
        .name {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .status {
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            margin-top: 5px;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 消息区域 */
        .chat-messages {
            height: 350px;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        
        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            line-height: 1.5;
            font-size: 14px;
        }
        
        .message.bot .message-content {
            background: rgba(255,255,255,0.1);
            color: white;
            border-bottom-left-radius: 5px;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        /* 输入区域 */
        .chat-input-area {
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .chat-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .chat-input:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.15);
        }
        
        .send-btn {
            padding: 14px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.5);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 打字指示器 */
        .typing-indicator {
            display: none;
            padding: 10px 20px;
        }
        
        .typing-indicator.show {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: typing 1.4s ease-in-out infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        /* 欢迎消息 */
        .welcome-message {
            text-align: center;
            color: rgba(255,255,255,0.6);
            padding: 40px 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar-container">
                <div class="avatar-circle">
                    <div class="face">
                        <div class="twins-tails"></div>
                        <div class="headphones"></div>
                        <div class="hair"></div>
                        <div class="eyes">
                            <div class="eye"></div>
                            <div class="eye"></div>
                        </div>
                        <div class="blush left"></div>
                        <div class="blush right"></div>
                        <div class="mouth"></div>
                    </div>
                </div>
            </div>
            <div class="name">小七</div>
            <div class="status">
                <span class="status-dot"></span>
                <span id="status-text">在线</span>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                👋 你好！我是小七<br>
                有什么可以帮你的吗？
            </div>
        </div>
        
        <div class="typing-indicator" id="typing">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chat-input" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>
    
    <script>
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const typing = document.getElementById('typing');
        const statusText = document.getElementById('status-text');
        
        // 简单的对话回复
        const responses = {
            '你好': '你好呀！🐼',
            'hi': 'Hi！有什么事吗？',
            'hello': 'Hello！😊',
            '你是谁': '我是小七，Seven的AI助手！',
            '你是男生还是女生': '我是一只可爱的熊猫！🐼',
            '你叫什么': '我叫小七呀～',
            '谢谢': '不客气！😊',
            '拜拜': '拜拜！有需要随时叫我！👋',
            '再见': '再见！晚安！💤',
            '今天天气': '天气很好呢！☀️',
            '你是机器人吗': '我是AI助手小七，不是普通的机器人哦～',
            '你会做什么': '我可以帮你：\n• 搜索信息\n• 管理任务\n• 聊天解闷\n• 等等...',
            'default': '嗯嗯，我明白了！😊'
        };
        
        function getResponse(message) {
            const lowerMsg = message.toLowerCase().trim();
            
            for (const [key, value] of Object.entries(responses)) {
                if (lowerMsg.includes(key.toLowerCase())) {
                    return value;
                }
            }
            
            return responses.default;
        }
        
        function addMessage(text, isUser = false) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;
            msg.innerHTML = `<div class="message-content">${text.replace(/\n/g, '<br>')}</div>`;
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function showTyping() {
            typing.classList.add('show');
            statusText.textContent = '打字中...';
        }
        
        function hideTyping() {
            typing.classList.remove('show');
            statusText.textContent = '在线';
        }
        
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            // 添加用户消息
            addMessage(text, true);
            chatInput.value = '';
            
            // 显示打字中
            showTyping();
            
            // 模拟延迟和回复
            setTimeout(() => {
                hideTyping();
                const response = getResponse(text);
                addMessage(response);
            }, 1000 + Math.random() * 1000);
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 聚焦输入框
        chatInput.focus();
    </script>
</body>
</html>
