<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星契 · 塔罗命运指南</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
            margin-bottom: 16px;
            object-fit: cover;
        }
        
        h1 {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #e94560, #c678dd, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        
        .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
        
        /* 用户状态 */
        .user-status {
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px;
        }
        .user-badge {
            padding: 6px 14px; background: rgba(139,92,246,0.2); border: 1px solid rgba(139,92,246,0.3); border-radius: 20px; font-size: 12px; color: #c678dd;
        }
        .user-switch {
            padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; font-size: 11px; color: rgba(255,255,255,0.6); cursor: pointer;
        }
        .user-switch:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        /* Tab切换 */
        .tabs {
            display: flex;
            gap: 8px;
            margin: 20px 0;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #e94560, #8b5cf6);
            border-color: transparent;
            color: #fff;
        }
        
        /* 抽牌区 */
        .draw-area {
            text-align: center;
            padding: 20px 0;
        }
        
        .tarot-card {
            width: 140px;
            height: 200px;
            background: linear-gradient(135deg, #2d1b4e, #4a2c7a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid rgba(139, 92, 246, 0.3);
        }
        
        .tarot-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(138, 43, 226, 0.4);
        }
        
        .tarot-card .card-emoji {
            font-size: 64px;
        }
        
        .draw-btn {
            background: linear-gradient(135deg, #e94560, #8b5cf6);
            border: none;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 36px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        
        .draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.5);
        }
        
        /* 结果展示 */
        .result-card {
            display: none;
            animation: fadeIn 0.5s;
        }
        
        .result-card.show {
            display: block;
        }
        
        /* 牌名和emoji */
        .card-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .result-emoji {
            font-size: 72px;
            margin-bottom: 10px;
        }
        
        .card-name {
            font-size: 20px;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 8px;
        }
        
        .card-summary {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            font-style: italic;
            margin-bottom: 15px;
        }
        
        /* 核心能量 */
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 3px solid #e94560;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #c678dd;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .section-content {
            font-size: 13px;
            line-height: 1.7;
            color: rgba(255,255,255,0.85);
        }
        
        /* 关键词 */
        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }
        
        .keyword {
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #c678dd;
        }
        
        /* 四维运势 */
        .fortune-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        
        .fortune-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        
        .fortune-icon {
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .fortune-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 3px;
        }
        
        .fortune-score {
            font-size: 16px;
            font-weight: 600;
            color: #e94560;
        }
        
        /* 幸运提示 */
        .lucky-tips {
            display: flex;
            justify-content: space-around;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
        }
        
        .lucky-item {
            text-align: center;
        }
        
        .lucky-label {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 3px;
        }
        
        .lucky-value {
            font-size: 13px;
            font-weight: 600;
            color: #c678dd;
        }
        
        /* 金句 */
        .gold-sentence {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            font-size: 14px;
            font-style: italic;
            color: rgba(255,255,255,0.9);
            margin: 15px 0;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        
        .gold-sentence::before {
            content: '✨ ';
        }
        
        .gold-sentence::after {
            content: ' ✨';
        }
        
        /* AI按钮 */
        .ai-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            border: none;
            color: #1a0a2e;
            font-size: 14px;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        
        .ai-btn:hover {
            transform: translateY(-2px);
        }
        
        .ai-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .ai-loading {
            display: none;
            text-align: center;
            padding: 15px;
            color: rgba(255,255,255,0.7);
        }
        
        .ai-loading.show {
            display: block;
        }
        
        .ai-response {
            display: none;
            background: rgba(67, 233, 123, 0.1);
            border: 1px solid rgba(67, 233, 123, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 2;
            color: rgba(255,255,255,0.95);
            text-align: left;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .ai-response .section-title {
            color: #43e97b;
            font-weight: 600;
            margin: 15px 0 8px 0;
        }
        
        .ai-response .divider {
            border-top: 1px dashed rgba(67,233,123,0.3);
            margin: 15px 0;
        }
        
        .ai-response.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        /* 三牌阵 */
        .spread-section {
            display: none;
        }
        
        .spread-section.active {
            display: block;
        }
        
        .daily-section.active {
            display: block;
        }
        
        .daily-section {
            display: none;
        }
        
        .daily-section.active {
            display: block;
        }
        
        .spread-cards {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            gap: 10px;
        }
        
        .spread-slot {
            flex: 1;
            text-align: center;
        }
        
        .spread-position {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        
        .spread-card {
            width: 100%;
            aspect-ratio: 2/3;
            max-height: 140px;
            background: linear-gradient(135deg, #2d1b4e, #4a2c7a);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            cursor: pointer;
            transition: transform 0.3s;
            border: 2px solid rgba(139, 92, 246, 0.3);
            padding: 5px;
        }
        
        .spread-card:hover {
            transform: scale(1.05);
        }
        
        .spread-card.revealed {
            background: linear-gradient(135deg, #e94560, #8b5cf6);
            color: #fff;
        }
        
        .spread-emoji {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .spread-name {
            font-size: 9px;
            font-weight: 600;
        }
        
        .spread-result-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 3px solid #8b5cf6;
        }
        
        .spread-result-title {
            font-size: 14px;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 底部 */
        footer {
            text-align: center;
            padding: 30px 0;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
        }
        
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.5), transparent);
            margin: 25px 0;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <header>
            <img src="tarot_icon.png" alt="星契" class="logo">
            <h1>星契 · 塔罗命运指南</h1>
            <p class="subtitle">探索命运的星辰密码，每一张牌都是你的故事</p>
            <div class="user-status" id="userStatus">
                <span class="user-badge" id="userBadge">加载中...</span>
                <span class="user-switch" id="historyBtn" onclick="showHistoryModal()">📜 历史</span>
                <span class="user-switch" id="userSwitchBtn" onclick="switchUser()">切换用户</span>
            </div>
        </header>
        
        <div class="tabs">
            <div class="tab active" data-tab="daily">🔮 每日抽牌</div>
            <div class="tab" data-tab="spread">🌟 三牌阵</div>
        </div>
        
        <!-- 每日抽牌 -->
        <div class="daily-section active" id="dailySection">
            <div class="draw-area">
                <div class="tarot-card" id="dailyCard" onclick="toggleCard()">
                    <span class="card-emoji" id="cardPreview">🃏</span>
                </div>
                <button class="draw-btn" id="dailyDrawBtn">抽取今日塔罗</button>
            </div>
            
            <div class="result-card" id="dailyResult">
                <!-- 牌头 -->
                <div class="card-header">
                    <div class="result-emoji" id="resultEmoji"></div>
                    <div class="card-name" id="dailyName"></div>
                    <div class="keywords" id="dailyKeywords"></div>
                    <div class="card-summary" id="dailySummary"></div>
                </div>
                
                <!-- 核心能量 -->
                <div class="section">
                    <div class="section-title">⚡ 核心能量</div>
                    <div class="section-content" id="dailyCore"></div>
                </div>
                
                <!-- 四维运势 -->
                <div class="fortune-grid" id="fortuneGrid">
                    <div class="fortune-item">
                        <div class="fortune-icon">💕</div>
                        <div class="fortune-label">爱情</div>
                        <div class="fortune-score" id="loveScore">-</div>
                    </div>
                    <div class="fortune-item">
                        <div class="fortune-icon">💼</div>
                        <div class="fortune-label">事业</div>
                        <div class="fortune-score" id="careerScore">-</div>
                    </div>
                    <div class="fortune-item">
                        <div class="fortune-icon">💪</div>
                        <div class="fortune-label">健康</div>
                        <div class="fortune-score" id="healthScore">-</div>
                    </div>
                    <div class="fortune-item">
                        <div class="fortune-icon">💰</div>
                        <div class="fortune-label">财运</div>
                        <div class="fortune-score" id="wealthScore">-</div>
                    </div>
                </div>
                
                <!-- 今日指引 -->
                <div class="section">
                    <div class="section-title">🌟 今日指引</div>
                    <div class="section-content" id="dailyGuidance"></div>
                </div>
                
                <!-- 幸运提示 -->
                <div class="lucky-tips" id="luckyTips">
                    <div class="lucky-item">
                        <div class="lucky-label">幸运数字</div>
                        <div class="lucky-value" id="luckyNumber">-</div>
                    </div>
                    <div class="lucky-item">
                        <div class="lucky-label">幸运色</div>
                        <div class="lucky-value" id="luckyColor">-</div>
                    </div>
                    <div class="lucky-item">
                        <div class="lucky-label">贵人方位</div>
                        <div class="lucky-value" id="luckyDirection">-</div>
                    </div>
                </div>
                
                <!-- 金句 -->
                <div class="gold-sentence" id="goldSentence"></div>
                
                <button class="ai-btn" id="aiBtn">🤖 AI深度解读</button>
                
                <div class="ai-loading" id="aiLoading">
                    小七正在思考中...
                </div>
                
                <div class="ai-response" id="aiResponse"></div>
            </div>
        </div>
        
        <!-- 三牌阵 -->
        <div class="spread-section" id="spreadSection">
            
            <!-- 问题输入阶段 -->
            <div class="spread-phase" id="spreadPhaseQuestion">
                <div style="text-align:center; padding: 20px 0;">
                    <div style="font-size: 16px; color: rgba(255,255,255,0.9); margin-bottom: 20px;">🔮 请在心中默念你的问题</div>
                    <textarea id="spreadQuestion" placeholder="例如：我最近的工作发展会如何？" style="width:90%; max-width:400px; padding:15px; background:rgba(255,255,255,0.05); border:1px solid rgba(139,92,246,0.3); border-radius:12px; color:#fff; font-size:14px; resize:none; outline:none;" rows="2"></textarea>
                    <div style="margin-top: 20px;">
                        <button onclick="startMeditation()" style="padding:14px 40px; background:linear-gradient(135deg,#9d4edd,#c678dd); border:none; border-radius:25px; color:#fff; font-size:15px; cursor:pointer;">✨ 开始冥想</button>
                    </div>
                </div>
            </div>
            
            <!-- 冥想阶段 -->
            <div class="spread-phase" id="spreadPhaseMeditation" style="display:none;">
                <div style="text-align:center; padding: 60px 20px;">
                    <div id="meditationAnimation" style="font-size: 60px; margin-bottom: 30px;">🌙</div>
                    <div style="font-size: 18px; color: rgba(255,255,255,0.8); margin-bottom: 15px;">专注你的问题...</div>
                    <div style="font-size: 14px; color: rgba(255,255,255,0.5);">让宇宙的星辰指引你</div>
                </div>
            </div>
            
            <!-- 抽牌阶段 -->
            <div class="spread-phase" id="spreadPhaseDraw" style="display:none;">
                <div style="text-align:center; margin-bottom: 20px;">
                    <div style="font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 10px;">你的问题：</div>
                    <div id="spreadQuestionDisplay" style="font-size: 14px; color: #c678dd; max-width: 350px; margin: 0 auto;"></div>
                </div>
                <div style="text-align:center; margin-bottom: 20px;">
                    <p style="color: rgba(255,255,255,0.7); font-size: 13px;">请依次点击三张牌</p>
                </div>
                
                <div class="spread-cards">
                    <div class="spread-slot">
                        <div class="spread-position">过去</div>
                        <div class="spread-card" id="spreadCard0">点击抽牌</div>
                    </div>
                    <div class="spread-slot">
                        <div class="spread-position">现在</div>
                        <div class="spread-card" id="spreadCard1">点击抽牌</div>
                    </div>
                    <div class="spread-slot">
                        <div class="spread-position">未来</div>
                        <div class="spread-card" id="spreadCard2">点击抽牌</div>
                    </div>
                </div>
                
                <button class="draw-btn" id="spreadResetBtn" style="display:none; margin: 15px auto;">🔄 重新开始</button>
                
                <div class="spread-result" id="spreadResult"></div>
            </div>
        </div>
        
        <div class="divider"></div>
        
        <div class="features">
            <div class="fortune-item" style="background: rgba(255,255,255,0.03);">
                <div class="fortune-icon">🃏</div>
                <div class="fortune-label">78张牌</div>
            </div>
            <div class="fortune-item" style="background: rgba(255,255,255,0.03);">
                <div class="fortune-icon">📊</div>
                <div class="fortune-label">四维运势</div>
            </div>
            <div class="fortune-item" style="background: rgba(255,255,255,0.03);">
                <div class="fortune-icon">🤖</div>
                <div class="fortune-label">AI解读</div>
            </div>
        </div>
        
        <footer>
            <p>让古老的塔罗智慧，照进你的日常生活</p>
            <p style="margin-top: 6px;">© 2026 星契 · 小七出品</p>
        </footer>
    </div>
    
    <script src="tarot-data.js"></script>
    <script>
        // 星星背景
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 60; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(star);
        }
        
        // 初始化
        const dailyDrawBtn = document.getElementById('dailyDrawBtn');
        const dailyCard = document.getElementById('dailyCard');
        const dailyResult = document.getElementById('dailyResult');
        
        dailyResult.classList.remove('show');
        dailyDrawBtn.textContent = '🔮 抽取今日塔罗';
        document.getElementById('cardPreview').textContent = '🃏';
        
        // Tab切换
        const tabs = document.querySelectorAll('.tab');
        const dailySection = document.getElementById('dailySection');
        const spreadSection = document.getElementById('spreadSection');
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabName = tab.dataset.tab;
                
                // 先隐藏所有section
                dailySection.classList.remove('active');
                spreadSection.classList.remove('active');
                
                // 再显示目标section
                if (tabName === 'daily') {
                    dailySection.classList.add('active');
                } else {
                    spreadSection.classList.add('active');
                }
            });
        });
        
        // 每日抽牌
        let dailyCardData = null;
        
        dailyDrawBtn.addEventListener('click', () => {
            const card = getRandomCard();
            dailyCardData = card;
            
            // 更新牌面
            document.getElementById('cardPreview').textContent = card.emoji || '🃏';
            document.getElementById('resultEmoji').textContent = card.emoji || '🃏';
            document.getElementById('dailyName').textContent = card.name;
            document.getElementById('dailyKeywords').innerHTML = card.keywords.map(k => `<span class="keyword">${k}</span>`).join('');
            
            // 如果有大阿尔卡纳的详细信息
            if (card.summary) {
                document.getElementById('dailySummary').textContent = card.summary;
                document.getElementById('dailySummary').style.display = 'block';
                document.getElementById('dailyCore').textContent = card.coreEnergy;
                document.getElementById('dailyGuidance').innerHTML = card.guidance.replace(/\n/g, '<br>');
                
                // 四维评分
                if (card.love) {
                    document.getElementById('loveScore').textContent = '★'.repeat(card.love.score) + '☆'.repeat(5 - card.love.score);
                }
                if (card.career) {
                    document.getElementById('careerScore').textContent = '★'.repeat(card.career.score) + '☆'.repeat(5 - card.career.score);

            }

            document.getElementById('spreadQuestionDisplay').textContent = userQuestion;
            
            // 星辰动画
            const meditationEl = document.getElementById('meditationAnimation');
            const phases = ['🌙', '✨', '⭐', '🌟', '✨'];
            let i = 0;
            const animation = setInterval(() => {
                meditationEl.textContent = phases[i % phases.length];
                meditationEl.style.transform = 'scale(' + (1 + Math.sin(i * 0.5) * 0.2 + ')';
                i++;
            }, 800);
            
            // 3秒后进入抽牌阶段
            setTimeout(() => {
                clearInterval(animation);
                document.getElementById('spreadPhaseMeditation').style.display = 'none';
                document.getElementById('spreadPhaseDraw').style.display = 'block';
                meditationDone = true;
            }, 3000);
        }

        // 格式化AI回复文本
        function formatAIReply(text) {
            // 清理文本
            text = text.replace(/\n{3,}/g, '\n\n').replace(/。。/g, '。').replace(/[,，]+。/g, '。').trim();
            
            // 尝试识别标题和内容
            const sections = [];
            const lines = text.split('\n');
            let currentTitle = '';
            let currentContent = [];
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                // 检测是否是标题行（以【】或数字+。或特定关键词开头）
                const titleMatch = line.match(/^[【\[]([^】\]]+)[】\]]/);
                if (titleMatch) {
                    // 保存上一个section
                    if (currentTitle || currentContent.length) {
                        sections.push({
                            title: currentTitle || '解读',
                            content: currentContent.join(' ').substring(0, 300)
                        });
                    }
                    currentTitle = titleMatch[1];
                    currentContent = [line.replace(/^[【\[][^】\]]+[】\]]\s*/, '')];
                } else if (line.match(/^[0-9]+[.、]\s*/) && line.length < 30) {
                    // 数字编号的标题
                    if (currentTitle || currentContent.length) {
                        sections.push({
                            title: currentTitle || '解读',
                            content: currentContent.join(' ').substring(0, 300)
                        });
                    }
                    currentTitle = line.replace(/^[0-9]+[.、]\s*/, '');
                    currentContent = [];
                } else {
                    currentContent.push(line);
                }
            }
            
            // 保存最后一个section
            if (currentTitle || currentContent.length) {
                sections.push({
                    title: currentTitle || '深度解读',
                    content: currentContent.join(' ').substring(0, 400)
                });
            }
            
            // 如果没有识别出结构，按默认方式处理
            if (sections.length === 0) {
                sections.push({
                    title: '解读',
                    content: text.substring(0, 400)
                });
            }
            
            return sections.slice(0, 5); // 最多5个section
        }
        
        function requestSpreadAI() {
            const resultDiv = document.getElementById('spreadResult');
            
            // 保存当前三牌阵内容

            // 构建更详细的三牌阵信息（包含用户问题）
            const cardsInfo = spreadCards.map((card, i) => {
                const pos = ['过去', '现在', '未来'][i];

                const careerScore = card.career ? card.career.score : 0;

                const wealthScore = card.wealth ? card.wealth.score : 0;
                return `${pos}：「${card.name}」${card.emoji} | 关键词: ${card.keywords ? card.keywords.join(', ') : '无'} | 爱情:${loveScore}★ 事业:${careerScore}★ 健康:${healthScore}★ 财运:${wealthScore}★ | 解读: ${card.summary || card.meaning || ''}`;
            }).join('\n');
            
            const prompt = `你是塔罗占卜师，请深度解读三牌阵的能量关系。

用户的问题：${userQuestion}

三牌阵：
${cardsInfo}

请根据用户的问题，结合牌面进行深度分析：
1. 【能量流分析】过去牌如何影响现在牌，现在牌又如何指向未来牌？与用户问题有何关联？

请用温暖而有洞察力的语气回答，语言要优美流畅，针对用户的问题给出具体建议。`;
            
            fetch('/chat', {
