<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小七 - 桌面宠物</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
        }
        
        .avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
            animation: float 3s ease-in-out infinite;
            transition: all 0.5s ease;
            position: relative;
        }
        
        .avatar::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f093fb 0%, #f5576c 100%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .avatar.thinking::before {
            opacity: 1;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .avatar.happy {
            background: linear-gradient(145deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 20px 60px rgba(240, 147, 251, 0.4);
        }
        
        .avatar.speaking {
            background: linear-gradient(145deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 20px 60px rgba(79, 172, 254, 0.4);
        }
        
        .avatar.offline {
            background: linear-gradient(145deg, #5a5a5a 0%, #3a3a3a 100%);
            box-shadow: 0 20px 60px rgba(90, 90, 90, 0.4);
            animation: none;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.4; }
        }
        
        .emoji {
            font-size: 100px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }
        
        .name {
            font-size: 32px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }
        
        .status {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            margin-right: 8px;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .message {
            margin-top: 30px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            color: #fff;
            max-width: 400px;
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        
        .message.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .controls {
            margin-top: 40px;
        }
        
        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .btn.active {
            background: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar" id="avatar">
            <span class="emoji">🐼</span>
        </div>
        <div class="name">小七</div>
        <div class="status">
            <span class="status-dot"></span>
            <span id="status-text">在线</span>
        </div>
        <div class="message" id="message">
            有什么可以帮你的吗？
        </div>
        <div class="controls">
            <button class="btn" onclick="setStatus('thinking')">思考中</button>
            <button class="btn" onclick="setStatus('speaking')">说话中</button>
            <button class="btn" onclick="setStatus('happy')">开心</button>
            <button class="btn" onclick="setStatus('offline')">离线</button>
        </div>
    </div>
    
    <script>
        const avatar = document.getElementById('avatar');
        const statusText = document.getElementById('status-text');
        const message = document.getElementById('message');
        
        const statusMap = {
            'thinking': { text: '思考中...', emoji: '🤔', class: 'thinking' },
            'speaking': { text: '说话中...', emoji: '🐼', class: 'speaking' },
            'happy': { text: '开心', emoji: '🐼', class: 'happy' },
            'offline': { text: '离线', emoji: '😴', class: 'offline' }
        };
        
        function setStatus(status) {
            const info = statusMap[status];
            
            avatar.className = 'avatar ' + info.class;
            avatar.querySelector('.emoji').textContent = info.emoji;
            statusText.textContent = info.text;
        }
        
        function showMessage(text) {
            message.textContent = text;
            message.classList.add('show');
            
            setTimeout(() => {
                message.classList.remove('show');
            }, 5000);
        }
        
        // Demo animation
        setTimeout(() => {
            setStatus('thinking');
            showMessage('正在思考...');
        }, 2000);
        
        setTimeout(() => {
            setStatus('happy');
            showMessage('找到答案了！🎉');
        }, 5000);
    </script>
</body>
</html>
